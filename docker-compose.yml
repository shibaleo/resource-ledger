services:
  xtdb-catalog:
    image: ghcr.io/xtdb/xtdb:latest
    ports:
      - "5433:5432"   # pgwire (dc_catalog)
      - "8081:8080"   # health check / monitoring
    volumes:
      - xtdb-catalog-data:/var/lib/xtdb

  xtdb-dcmp:
    image: ghcr.io/xtdb/xtdb:latest
    ports:
      - "5432:5432"   # pgwire (data_composition)
      - "8080:8080"   # health check / monitoring
    volumes:
      - xtdb-dcmp-data:/var/lib/xtdb

volumes:
  xtdb-catalog-data:
  xtdb-dcmp-data:
